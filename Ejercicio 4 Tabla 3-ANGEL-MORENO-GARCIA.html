<!DOCTYPE html>
<html lang="es">
<head>

<title>Calendarios del ejercicio 4 por angel</title>

<style>

body{
    background:#dcdcdc;
    font-family: Arial, Helvetica, sans-serif;
}

section{
    width:900px;
    margin:30px auto;
}

article{
    background:#ece8c9;
    padding:30px;
    margin-bottom:30px;
    border:1px solid #999;
}

table{
    width:60%;
    margin:0 auto;
    border-collapse:collapse;
    text-align:center;
}

/* 🔹 CAMBIADO: quitado border-top y border-bottom */
th{
    padding:5px;
    border-top:none;
    border-bottom:none;
    font-size:14px;
}

td{
    padding:6px;
    font-size:14px;
}

.titulo1{
    text-align:center;
    margin-bottom:10px;
}

.titulo1 span{
    display:inline-block;
    border-top:2px solid black;
    padding-top:10px;
    letter-spacing:4px;
}

.cal1 td{
    border-top:1px solid black;
}

.titulo2{
    width:60%;
    margin:0 auto 10px auto;
    text-align:right;
}

.cal2 th,
.cal2 td{
    border-left:1px solid black;
    border-right:1px solid black;
}

.titulo3{
    width:60%;
    margin:0 auto 10px auto;
    text-align:left;
}

.cal3 th,
.cal3 td{
    border-top:1px solid black;
    border-left:1px solid black;
    border-right:1px solid black;
}

/* 🔹 AÑADIDO: cerrar tabla de noviembre */
.cal3 tr:last-child td{
    border-bottom:1px solid black;
}

</style>
</head>
